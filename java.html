<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .calculator-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: left;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn-success {
            background-color: #5cb85c;
            color: white;
        }

        .btn-success:hover {
            background-color: #4cae4c;
        }

        .result-group {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }

        .result-label {
            font-weight: bold;
        }

        #calcResult {
            font-weight: normal;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h1>Simple Calculator</h1>

        <label for="num1">Enter first number:</label>
        <input type="number" id="num1" placeholder="Type first number">

        <label for="num2">Enter second number:</label>
        <input type="number" id="num2" placeholder="Type second number">

        <label for="operator">Choose an operator:</label>
        <select id="operator">
            <option value="add">+</option>
            <option value="subtract">-</option>
            <option value="multiply">*</option>
            <option value="divide">/</option>
        </select>

        <div class="button-group">
            <button class="btn-success" onclick="calculate()">Calculate</button>
            <button class="btn-success" onclick="resetCalculator()">Reset</button>
        </div>

        <div class="result-group">
            <span class="result-label">Result:</span>
            <span id="calcResult"></span>
        </div>
    </div>

    <script>
        function calculate() {
            const num1Input = document.getElementById("num1");
            const num2Input = document.getElementById("num2");
            const operatorInput = document.getElementById("operator");
            const resultArea = document.getElementById("calcResult");

            const n1 = parseFloat(num1Input.value);
            const n2 = parseFloat(num2Input.value);
            const op = operatorInput.value;

            if (isNaN(n1) || isNaN(n2)) {
                resultArea.innerText = "Please enter valid numbers.";
                resultArea.style.fontWeight = 'normal';
                resultArea.style.color = 'red';
                return;
            }

            let finalResult;
            switch(op) {
                case 'add':
                    finalResult = n1 + n2;
                    break;
                case 'subtract':
                    finalResult = n1 - n2;
                    break;
                case 'multiply':
                    finalResult = n1 * n2;
                    break;
                case 'divide':
                    if (n2 === 0) {
                        resultArea.innerText = "Error: Division by zero!";
                        resultArea.style.color = 'red';
                        return;
                    }
                    finalResult = n1 / n2;
                    break;
                default:
                    finalResult = "Invalid Operator";
            }

            resultArea.innerText = finalResult;
            resultArea.style.fontWeight = 'bold';
            resultArea.style.color = 'black';
        }

        function resetCalculator() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("operator").selectedIndex = 0;
            
            const resultArea = document.getElementById("calcResult");
            resultArea.innerText = "";
            resultArea.style.fontWeight = 'normal';
        }
    </script>

</body>
</html>
